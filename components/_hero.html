<section class="hero-section compact-hero">
    <div class="hero-bg-overlay">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container hero-center-content">
        <div class="hero-header-minimal">
            <a href="tel:+918883451668" class="trust-pill-wrapper" style="text-decoration: none;">
                <div class="shimmer-pill">
                    <span class="pill-badge">
                        <i class="fas fa-certificate"></i>
                        <span class="pill-text">Internationally Licensed Drivers</span>
                        <span class="pill-verify-icon">
                            <i class="fas fa-check-circle"></i>
                        </span>
                    </span>
                    <div class="shimmer-effect"></div>
                </div>
            </a>
            <h1 class="hero-headline-tight">Premium Travel. <br><span class="highlight">Local Pricing.</span></h1>
            <p class="hero-subline-tight">Chennai's most trusted Chauffeur service for Corporate & Outstation.</p>
        </div>

        <div class="booking-pill-container" style="display: flex; flex-direction: column; align-items: center;">
            <form id="quickBookForm" class="hero-booking-minimal">
                <div class="minimal-input-container">
                    <div class="search-input-group">
                        <i class="fas fa-map-marker-alt icon-accent"></i>
                        <input type="text" id="routeSearch" placeholder="Where to? (e.g. Chennai to Pondy)" required>
                    </div>

                    <div class="action-group">
                        <div class="date-minimal">
                            <i class="fas fa-calendar-day"></i>
                            <input type="date" id="travelDate" required>
                        </div>
                        <button type="submit" class="btn-shAction">
                            <span>Get Estimate</span>
                            <i class="fab fa-whatsapp"></i>
                        </button>
                    </div>
                </div>
            </form>

            <div class="mini-badges">
                <span><i class="fas fa-check-circle"></i> Zero Surge</span>
                <span><i class="fas fa-check-circle"></i> GST Invoices</span>
                <span><i class="fas fa-check-circle"></i> Airport Experts</span>
            </div>
        </div>
    </div>
</section>
