<section class="hero-section compact-hero">
  <div class="hero-bg-overlay">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container hero-center-content">
    <div class="hero-header-minimal">
      <a
        href="tel:+918883451668"
        class="trust-pill-wrapper"
        style="text-decoration: none"
      >
        <div class="shimmer-pill">
          <span class="pill-badge">
            <i class="fas fa-certificate"></i>
            <span class="pill-text">Internationally Licensed Drivers</span>
            <span class="pill-verify-icon">
              <i class="fas fa-check-circle"></i>
            </span>
          </span>
          <div class="shimmer-effect"></div>
        </div>
      </a>
      <h1 class="hero-headline-tight">
        Premium Travel. <br /><span class="highlight">Local Pricing.</span>
      </h1>
      <p class="hero-subline-tight">
        Chennai's most trusted Chauffeur service for Corporate & Outstation.
      </p>
    </div>
    <!-- Live Activity Ticker -->
    <div
      class="activity-ticker"
      style="
        margin-top: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        font-size: 0.85rem;
        color: var(--text-light);
      "
    >
      <span style="display: flex; align-items: center; gap: 5px">
        <span
          style="
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
          "
        ></span>
        <span id="live-bookings">12 people booked today</span>
      </span>
      <span>|</span>
      <span>⭐ 4.9/5 (127 Reviews)</span>
      <span>|</span>
      <span>🚗 50+ Vehicles Available</span>
    </div>

    <style>
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>

    <script>
      // Simulate live activity
      const bookings = [8, 12, 15, 11, 14, 9, 16, 13];
      let idx = 0;
      setInterval(() => {
        document.getElementById("live-bookings").textContent =
          bookings[idx] + " people booked today";
        idx = (idx + 1) % bookings.length;
      }, 8000);
    </script>
    <div
      class="booking-pill-container"
      style="display: flex; flex-direction: column; align-items: center"
    >
      <form
        id="quickBookForm"
        class="hero-booking-minimal"
        onsubmit="trackEvent('form_submit', 'engagement', 'hero_estimate')"
      >
        <div class="minimal-input-container">
          <div class="search-input-group">
            <i class="fas fa-map-marker-alt icon-accent"></i>
            <input
              type="text"
              id="routeSearch"
              placeholder="Where to? (e.g. Chennai to Pondicherry)"
              required
              autocomplete="off"
            />
            <!-- Dropdown suggestions -->
            <div id="route-suggestions" class="route-dropdown"></div>
          </div>

          <div class="action-group">
            <div class="date-minimal">
              <i class="fas fa-calendar-day"></i>
              <input type="date" id="travelDate" required min="" />
            </div>
            <button
              type="submit"
              class="btn-shAction"
              onclick="trackEvent('click', 'conversion', 'get_estimate')"
            >
              <span>Get Estimate</span>
              <i class="fab fa-whatsapp"></i>
            </button>
          </div>
        </div>
      </form>

      <script>
        // Set min date to today
        document.getElementById("travelDate").min = new Date()
          .toISOString()
          .split("T")[0];

        // Popular routes autocomplete
        const popularRoutes = [
          "Chennai to Pondicherry",
          "Chennai to Tirupati",
          "Chennai to Bangalore",
          "Chennai Airport to City",
          "Chennai to Mahabalipuram",
          "Chennai to Vellore",
        ];

        const searchInput = document.getElementById("routeSearch");
        const dropdown = document.getElementById("route-suggestions");

        searchInput.addEventListener("input", (e) => {
          const val = e.target.value.toLowerCase();
          if (val.length < 2) {
            dropdown.style.display = "none";
            return;
          }

          const matches = popularRoutes.filter((r) =>
            r.toLowerCase().includes(val),
          );
          if (matches.length > 0) {
            dropdown.innerHTML = matches
              .map(
                (r) =>
                  `<div class="suggestion-item" onclick="selectRoute('${r}')">${r}</div>`,
              )
              .join("");
            dropdown.style.display = "block";
          } else {
            dropdown.style.display = "none";
          }
        });

        function selectRoute(route) {
          searchInput.value = route;
          dropdown.style.display = "none";
          trackEvent("select", "engagement", "route_suggestion");
        }

        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
          if (!e.target.closest(".search-input-group")) {
            dropdown.style.display = "none";
          }
        });
      </script>

      <style>
        .route-dropdown {
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: white;
          border-radius: 12px;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
          margin-top: 8px;
          display: none;
          z-index: 100;
          overflow: hidden;
        }
        .suggestion-item {
          padding: 12px 20px;
          cursor: pointer;
          border-bottom: 1px solid #f1f5f9;
          font-size: 0.9rem;
        }
        .suggestion-item:hover {
          background: #f8fafc;
        }
      </style>

      <div class="mini-badges">
        <span><i class="fas fa-check-circle"></i> Zero Surge</span>
        <span><i class="fas fa-check-circle"></i> GST Invoices</span>
        <span><i class="fas fa-check-circle"></i> Airport Experts</span>
      </div>
    </div>
  </div>
</section>
